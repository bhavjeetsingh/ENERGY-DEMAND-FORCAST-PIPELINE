services:
  fastapi-forecaster:
    build: .
    container_name: energy_forecaster_api
    ports:
      - "8000:8000"
    environment:
      # Use HTTP to talk directly to the MLflow container over the Docker network
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
    volumes:
      # Map the entire project root to /app inside the container
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - mlflow-server

  mlflow-server:
    image: python:3.11-slim
    container_name: mlflow_ui
    ports:
      - "5000:5000"
    # The allowed-hosts flag prevents the 403 "Invalid Host header" error
    # We use an array format for the command to ensure Windows handles the string correctly
    command: ["bash", "-c", "pip install mlflow && mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 0.0.0.0 --allowed-hosts mlflow-server,mlflow-server:5000,localhost,127.0.0.1"]    volumes:
      # Map the project root to /mlflow so the database saves to your Windows drive
      - .:/mlflow
    working_dir: /mlflow
    restart: always